# ===========================
# Base de données MySQL
# ===========================
spring.datasource.url=jdbc:mysql://localhost:3306/gestion_projets?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===========================
# JPA / Hibernate
# ===========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ===========================
# Serveur
# ===========================
server.port=8081
server.error.include-message=always
server.error.include-binding-errors=always

# ===========================
# JWT
# ===========================
app.jwt.secret=GestionProjetsSecretKeyTresLongue2024SuperSecureKey!@#$%^&*
app.jwt.expiration=86400000

# ===========================
# Swagger / OpenAPI
# ===========================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# ===========================
# Upload fichiers
# ===========================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads

# ===========================
# Logging
# ===========================
logging.level.ma.fstg.gestionprojets=DEBUG
logging.level.org.springframework.security=INFO
