version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: gp_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: gestion_projets
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - gp_network
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: gp_backend
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/gestion_projets?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=rootpassword
      - APP_JWT_SECRET=GestionProjetsSecretKeyTresLongue2024SuperSecureKeyProd!@#$%^&*
    depends_on:
      db:
        condition: service_healthy
    networks:
      - gp_network

  frontend:
    build: ./gestion-projets-frontend
    container_name: gp_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - gp_network

networks:
  gp_network:
    driver: bridge

volumes:
  mysql_data:
